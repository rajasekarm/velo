<svg xmlns="http://www.w3.org/2000/svg" width="680" height="150" viewBox="0 0 680 150">
  <title>VELO logo</title>
  <desc>/velo with a pipe cursor inline, same size as text</desc>

  <style>
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    .cursor{animation:blink 1.1s step-end infinite}
    .txt{fill:#000000}
    .sub{fill:#888780}
  </style>

  <text x="340" y="130" text-anchor="middle"
    font-family="'Courier New',Courier,monospace"
    font-size="96" font-weight="700"
    class="txt">/velo<tspan class="cursor">|</tspan></text>


</svg>
