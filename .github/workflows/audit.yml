name: Velo Agent Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: audit-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit agent integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run audit
        run: ./scripts/audit.sh
